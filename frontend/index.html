<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信用证智能制单系统 | AI 风控版</title>
    <!-- PDF.js (仅用于本地预览文件信息，解析由后端完成) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- FileSaver (用于保存后端返回的ZIP) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #131a2c 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            padding: 24px;
            color: #e6edf3;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 1.9rem; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59,130,246,0.3); border-radius: 40px; padding: 6px 16px; font-size: 0.8rem; }
        .main-panel { display: grid; grid-template-columns: 1fr 1.2fr; gap: 24px; margin-bottom: 24px; }
        .upload-panel, .info-panel, .requirements-panel {
            background: rgba(18, 28, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(75, 110, 160, 0.2);
        }
        .section-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: #d1e0f0; }
        .upload-card {
            background: rgba(10, 18, 30, 0.6);
            border-radius: 18px;
            padding: 20px;
            border: 2px dashed rgba(75,110,160,0.3);
            cursor: pointer;
            margin-bottom: 16px;
            text-align: center;
            transition: 0.3s;
        }
        .upload-card:hover { border-color: #3b82f6; background: rgba(59,130,246,0.05); }
        .file-item { display: flex; align-items: center; justify-content: space-between; background: rgba(59,130,246,0.08); padding: 10px 14px; border-radius: 12px; margin-top: 8px; }
        .btn { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-outline { background: transparent; border: 1px solid #475569; color: #cbd5e1; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
        .btn-primary { background: #3b82f6; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
        .lc-preview-box { background: rgba(10,18,30,0.6); border-radius: 16px; padding: 18px; max-height: 420px; overflow-y: auto; }
        .lc-field-row { display: flex; margin-bottom: 12px; font-size: 0.85rem; border-bottom: 1px solid rgba(75,110,160,0.1); padding-bottom: 8px; }
        .lc-field-label { width: 130px; color: #60a5fa; font-weight: 500; flex-shrink: 0; }
        .lc-field-value { color: #cbd5e1; word-break: break-word; }
        .field-group { margin-bottom: 16px; }
        .field-group label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 0.85rem; color: #93c5fd; }
        .field-group input, .field-group textarea { width: 100%; padding: 10px 14px; border-radius: 14px; background: #0f172a; border: 1px solid #334155; color: white; }
        .flex-btns { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; justify-content: space-between; }
        .requirements-list { margin-top: 12px; }
        .req-item { background: rgba(59,130,246,0.08); margin: 8px 0; padding: 10px; border-radius: 12px; font-size: 0.85rem; border-left: 3px solid #3b82f6; }
        .risk-item-critical { background: rgba(239, 68, 68, 0.15); border-left: 3px solid #ef4444; }
        .risk-item-warning { background: rgba(234, 179, 8, 0.15); border-left: 3px solid #eab308; }
        .risk-item-info { background: rgba(59, 130, 246, 0.08); border-left: 3px solid #3b82f6; }
        .footer-note { text-align: center; margin-top: 40px; font-size: 0.75rem; color: #6c8aa5; }
        .hidden { display: none; }
        .raw-text-toggle { margin-top: 12px; color: #60a5fa; cursor: pointer; font-size: 0.8rem; }
        .raw-text-content { background: #0a121e; padding: 12px; border-radius: 8px; margin-top: 8px; font-family: monospace; font-size: 0.75rem; max-height: 150px; overflow-y: auto; white-space: pre-wrap; }
        #loadingSpinner { text-align: center; padding: 20px; color: #60a5fa; display: none; }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-file-invoice-dollar"></i> 信用证智能制单系统</h1>
        <div><span class="badge"><i class="fas fa-cloud-upload-alt"></i> 后端 AI 引擎 v3.0</span></div>
    </div>

    <div class="main-panel">
        <!-- 左侧：上传区 -->
        <div class="upload-panel">
            <div class="section-title"><i class="fas fa-cloud-upload-alt"></i> 1. 上传信用证 (PDF)</div>
            <div class="upload-card" id="lcUploadCard">
                <i class="fas fa-file-pdf fa-2x"></i>
                <div>点击或拖拽上传 PDF 信用证文件</div>
                <input type="file" id="lcFileInput" accept=".pdf" style="display:none">
                <button class="btn-outline" onclick="document.getElementById('lcFileInput').click()" style="margin-top:12px">选择PDF文件</button>
                <div id="lcFileList" class="file-list"></div>
            </div>
            <div id="loadingSpinner"><i class="fas fa-spinner spinner fa-2x"></i><br>正在解析并分析风险，请稍候...</div>

            <div class="section-title" style="margin-top:8px;"><i class="fas fa-edit"></i> 2. 补充信息（可修改）</div>
            <div class="field-group"><label>🚢 发货人 / 受益人</label><input type="text" id="shipperInput" placeholder="自动提取后可修改"></div>
            <div class="field-group"><label>📮 收货人 / 申请人</label><input type="text" id="consigneeInput" placeholder="自动提取后可修改"></div>
            <div class="field-group"><label>📢 通知方</label><input type="text" id="notifyInput" placeholder="通常同申请人"></div>
            <div class="field-group"><label>⚓ 船名/航次/装货港/卸货港</label><input type="text" id="vesselInput" placeholder="例: MAERSK CHICAGO / 2408W"></div>
            <div class="field-group"><label>📦 货物描述（可补充）</label><textarea id="goodsDescInput" rows="2"></textarea></div>
            <div class="field-group"><label>💰 发票号码</label><input type="text" id="invoiceNoInput" placeholder="自动生成"></div>
            <div class="flex-btns">
                <button class="btn-outline" id="clearBtn"><i class="fas fa-trash"></i> 清空</button>
                <button class="btn" id="generateAllBtn"><i class="fas fa-file-word"></i> 生成全部Word单据 (打包ZIP)</button>
            </div>
        </div>

        <!-- 右侧：信用证预览 + 风险 + 单据要求 -->
        <div class="info-panel">
            <div class="section-title"><i class="fas fa-shield-alt"></i> 风险分析报告</div>
            <div id="riskReport" class="requirements-list">
                <div style="color:#7a8fa8;">上传信用证后自动检测软条款、时间风险等</div>
            </div>

            <div class="section-title" style="margin-top:20px;"><i class="fas fa-info-circle"></i> 信用证关键信息</div>
            <div class="lc-preview-box">
                <div id="lcPreviewContent">— 等待上传并解析 —</div>
                <div id="rawTextToggle" class="raw-text-toggle hidden" onclick="toggleRawText()"><i class="fas fa-code"></i> 显示原始文本</div>
                <div id="rawTextContent" class="raw-text-content hidden"></div>
            </div>

            <div class="section-title" style="margin-top:20px;"><i class="fas fa-list-ul"></i> 📋 46A 单据要求分析</div>
            <div id="docRequirementsList" class="requirements-list">
                <div style="color:#7a8fa8;">上传信用证后自动显示每个单据所需份数</div>
            </div>

            <div class="section-title" style="margin-top:20px;"><i class="fas fa-flag-checkered"></i> 47A 附加条件</div>
            <div id="extraConditions" class="requirements-list"></div>
        </div>
    </div>

    <div class="footer-note">
        ⚡ 基于 UCP600 / ISBP821 专业解析，集成软条款检测、时间风险预警。<br>
        📌 后端服务部署于 Railway，数据安全隔离。
    </div>
</div>

<script>
    // ==================== 配置区 ====================
    // 🔥 重要：请替换为您的 Railway 后端实际域名
    const BACKEND_URL = 'https://your-backend.up.railway.app'; 
    // ===============================================

    // 全局变量
    let currentParsedData = null;   // 存储后端返回的解析数据
    let currentRisks = [];          // 存储风险列表
    let currentFile = null;         // 存储当前上传的文件对象

    // DOM 元素
    const lcFileInput = document.getElementById('lcFileInput');
    const lcUploadCard = document.getElementById('lcUploadCard');
    const lcFileList = document.getElementById('lcFileList');
    const lcPreviewContent = document.getElementById('lcPreviewContent');
    const rawTextToggle = document.getElementById('rawTextToggle');
    const rawTextContent = document.getElementById('rawTextContent');
    const docRequirementsList = document.getElementById('docRequirementsList');
    const extraConditionsDiv = document.getElementById('extraConditions');
    const riskReportDiv = document.getElementById('riskReport');
    const loadingSpinner = document.getElementById('loadingSpinner');

    const shipperInput = document.getElementById('shipperInput');
    const consigneeInput = document.getElementById('consigneeInput');
    const notifyInput = document.getElementById('notifyInput');
    const vesselInput = document.getElementById('vesselInput');
    const goodsDescInput = document.getElementById('goodsDescInput');
    const invoiceNoInput = document.getElementById('invoiceNoInput');

    // 辅助
    function generateInvoiceNo() { return "INV-" + new Date().getFullYear() + String(Math.floor(Math.random() * 10000)).padStart(4, '0'); }
    invoiceNoInput.value = generateInvoiceNo();

    // ==================== 上传 & 解析 ====================
    async function handleLCFile(file) {
        if (!file || file.type !== 'application/pdf') { 
            alert('请上传有效的 PDF 文件'); 
            return; 
        }
        currentFile = file;
        lcFileList.innerHTML = `<div class="file-item"><span><i class="fas fa-file-pdf"></i> ${file.name}</span><span onclick="removeLCFile()" style="cursor:pointer; color:#ef4444"><i class="fas fa-times"></i></span></div>`;
        
        // 显示加载状态
        loadingSpinner.style.display = 'block';
        riskReportDiv.innerHTML = '<div style="color:#60a5fa;"><i class="fas fa-spinner spinner"></i> 正在解析并分析风险...</div>';

        try {
            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch(`${BACKEND_URL}/parse`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`后端错误 (${response.status}): ${errText}`);
            }

            const result = await response.json();
            if (result.status !== 'success') {
                throw new Error(result.message || '解析失败');
            }

            // 存储数据
            currentParsedData = result.data;
            currentRisks = result.risks || [];

            // 更新界面
            updatePreviewUI(result.data);
            renderDocRequirements(result.data.document_list || []);
            renderExtraConditions(result.data.additional_conditions || '');
            renderRisks(currentRisks);

            // 填充表单
            shipperInput.value = result.data.beneficiary || '';
            consigneeInput.value = result.data.applicant || '';
            notifyInput.value = result.data.applicant || '';
            goodsDescInput.value = result.data.goods_description || '';
            vesselInput.value = result.data.port_loading ? `${result.data.port_loading} → ${result.data.port_discharge}` : '';

            // 原始文本（后端未返回原文，可留空或提示）
            rawTextContent.textContent = '后端解析已完成，原始文本暂未返回。';
            rawTextToggle.classList.remove('hidden');

        } catch (err) {
            console.error(err);
            riskReportDiv.innerHTML = `<div class="req-item risk-item-critical"><i class="fas fa-exclamation-circle"></i> 解析失败：${err.message}</div>`;
            alert('解析失败：' + err.message);
        } finally {
            loadingSpinner.style.display = 'none';
        }
    }

    // ==================== UI 更新函数 ====================
    function updatePreviewUI(d) {
        const html = `
            <div class="lc-field-row"><span class="lc-field-label">信用证号</span><span class="lc-field-value">${d.lc_number || '—'}</span></div>
            <div class="lc-field-row"><span class="lc-field-label">开证行</span><span class="lc-field-value">${d.issuing_bank || '—'}</span></div>
            <div class="lc-field-row"><span class="lc-field-label">申请人</span><span class="lc-field-value">${d.applicant || '—'}</span></div>
            <div class="lc-field-row"><span class="lc-field-label">受益人</span><span class="lc-field-value">${d.beneficiary || '—'}</span></div>
            <div class="lc-field-row"><span class="lc-field-label">金额</span><span class="lc-field-value">${d.amount || '—'}</span></div>
            <div class="lc-field-row"><span class="lc-field-label">有效期</span><span class="lc-field-value">${d.expiry || '—'}</span></div>
            <div class="lc-field-row"><span class="lc-field-label">最迟装运日</span><span class="lc-field-value">${d.latest_shipment || '—'}</span></div>
            <div class="lc-field-row"><span class="lc-field-label">装货港</span><span class="lc-field-value">${d.port_loading || '—'}</span></div>
            <div class="lc-field-row"><span class="lc-field-label">卸货港</span><span class="lc-field-value">${d.port_discharge || '—'}</span></div>
            <div class="lc-field-row"><span class="lc-field-label">货物描述</span><span class="lc-field-value">${d.goods_description || '—'}</span></div>
        `;
        lcPreviewContent.innerHTML = html;
    }

    function renderDocRequirements(list) {
        if (!list || !list.length) {
            docRequirementsList.innerHTML = '<div class="req-item">未检测到明确的46A单据要求。</div>';
            return;
        }
        let html = '';
        list.forEach(req => {
            html += `<div class="req-item"><strong>${req.name}</strong> — 正本: ${req.originals} 份, 副本: ${req.copies} 份</div>`;
        });
        docRequirementsList.innerHTML = html;
    }

    function renderExtraConditions(text) {
        if (!text) {
            extraConditionsDiv.innerHTML = '<div class="req-item">无附加条件 (47A 未提取到)</div>';
            return;
        }
        extraConditionsDiv.innerHTML = `<div class="req-item"><i class="fas fa-file-alt"></i> ${text.substring(0, 500)}${text.length > 500 ? '...' : ''}</div>`;
    }

    function renderRisks(risks) {
        if (!risks || !risks.length) {
            riskReportDiv.innerHTML = '<div class="req-item" style="border-left-color: #22c55e;"><i class="fas fa-check-circle" style="color:#22c55e;"></i> 未检测到明显风险，请仍需人工复核。</div>';
            return;
        }
        let html = '';
        risks.forEach(risk => {
            let cls = 'risk-item-info';
            if (risk.level === 'critical') cls = 'risk-item-critical';
            else if (risk.level === 'warning') cls = 'risk-item-warning';
            const icon = risk.level === 'critical' ? 'fa-times-circle' : (risk.level === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle');
            html += `<div class="req-item ${cls}"><i class="fas ${icon}"></i> ${risk.message}</div>`;
        });
        riskReportDiv.innerHTML = html;
    }

    // ==================== 生成文档 ====================
    async function generateAllDocuments() {
        if (!currentParsedData) {
            alert('请先上传并解析信用证 PDF！');
            return;
        }

        const formData = {
            shipper: shipperInput.value.trim() || currentParsedData.beneficiary,
            consignee: consigneeInput.value.trim() || currentParsedData.applicant,
            notify: notifyInput.value.trim() || currentParsedData.applicant,
            vessel: vesselInput.value.trim() || 'VESSEL / VOY',
            goods: goodsDescInput.value.trim() || currentParsedData.goods_description,
            invoice_no: invoiceNoInput.value.trim() || generateInvoiceNo()
        };

        try {
            document.getElementById('generateAllBtn').disabled = true;
            document.getElementById('generateAllBtn').innerHTML = '<i class="fas fa-spinner spinner"></i> 生成中...';

            const response = await fetch(`${BACKEND_URL}/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    parsed_data: currentParsedData,
                    form_data: formData
                })
            });

            if (!response.ok) {
                const err = await response.text();
                throw new Error(`生成失败 (${response.status}): ${err}`);
            }

            const blob = await response.blob();
            const filename = `LC_${currentParsedData.lc_number || 'DEFAULT'}_全套单据.zip`;
            saveAs(blob, filename);
            alert('✅ 全套Word单据已生成并开始下载！');

        } catch (err) {
            console.error(err);
            alert('生成失败：' + err.message);
        } finally {
            document.getElementById('generateAllBtn').disabled = false;
            document.getElementById('generateAllBtn').innerHTML = '<i class="fas fa-file-word"></i> 生成全部Word单据 (打包ZIP)';
        }
    }

    // ==================== 工具函数 ====================
    window.removeLCFile = () => {
        currentFile = null;
        currentParsedData = null;
        currentRisks = [];
        lcFileList.innerHTML = '';
        lcPreviewContent.innerHTML = '— 等待上传并解析 —';
        rawTextToggle.classList.add('hidden');
        rawTextContent.classList.add('hidden');
        docRequirementsList.innerHTML = '<div style="color:#7a8fa8;">上传信用证后自动显示每个单据所需份数</div>';
        extraConditionsDiv.innerHTML = '';
        riskReportDiv.innerHTML = '<div style="color:#7a8fa8;">上传信用证后自动检测软条款、时间风险等</div>';
        shipperInput.value = '';
        consigneeInput.value = '';
        notifyInput.value = '';
        goodsDescInput.value = '';
        vesselInput.value = '';
        invoiceNoInput.value = generateInvoiceNo();
        loadingSpinner.style.display = 'none';
    };

    window.toggleRawText = () => rawTextContent.classList.toggle('hidden');

    // ==================== 事件绑定 ====================
    lcUploadCard.addEventListener('click', () => lcFileInput.click());
    lcFileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleLCFile(e.target.files[0]); });
    document.getElementById('clearBtn').addEventListener('click', () => removeLCFile());
    document.getElementById('generateAllBtn').addEventListener('click', generateAllDocuments);

    // 拖拽上传
    lcUploadCard.addEventListener('dragover', (e) => { e.preventDefault(); lcUploadCard.style.borderColor = '#3b82f6'; });
    lcUploadCard.addEventListener('dragleave', () => { lcUploadCard.style.borderColor = 'rgba(75,110,160,0.3)'; });
    lcUploadCard.addEventListener('drop', async (e) => {
        e.preventDefault();
        lcUploadCard.style.borderColor = 'rgba(75,110,160,0.3)';
        const file = e.dataTransfer.files[0];
        if (file && file.type === 'application/pdf') await handleLCFile(file);
        else alert('请拖拽PDF文件');
    });
</script>
</body>
</html>
